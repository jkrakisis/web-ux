name: GDWEB weekday collector

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Notion에 등록하지 않고 결과만 확인"
        required: true
        default: false
        type: boolean
  schedule:
    - cron: "37 8 * * 1-5"
      timezone: "Asia/Seoul"

permissions:
  contents: write

concurrency:
  group: gdweb-daily
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONUTF8: "1"
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5-mini' }}
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_DATA_SOURCE_ID: ${{ secrets.NOTION_DATA_SOURCE_ID }}
      NOTION_PROPERTY_MAP: ${{ vars.NOTION_PROPERTY_MAP }}
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || false }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: python -m pip install .

      - name: Collect and register
        run: python -m gdweb_daily

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gdweb-report-${{ github.run_id }}
          path: reports/latest.txt
          if-no-files-found: ignore
          retention-days: 30

      - name: Persist checkpoint
        if: success() && env.DRY_RUN == 'false'
        run: |
          git config user.name "gdweb-daily-bot"
          git config user.email "gdweb-daily-bot@users.noreply.github.com"
          git add state/checkpoint.json
          git diff --cached --quiet || git commit -m "chore: update GDWEB checkpoint"
          git push

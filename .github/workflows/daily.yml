name: GDWEB weekday collector

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Notion에 등록하지 않고 결과만 확인"
        required: true
        default: false
        type: boolean
  schedule:
    - cron: "37 8 * * 1-5"
      timezone: "Asia/Seoul"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: gdweb-daily
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONUTF8: "1"
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5-mini' }}
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_DATA_SOURCE_ID: ${{ secrets.NOTION_DATA_SOURCE_ID }}
      NOTION_PROPERTY_MAP: ${{ vars.NOTION_PROPERTY_MAP }}
      # Secrets 설정 전 예약 실패를 막는다. LIVE_ENABLED=true일 때만 예약 실등록.
      DRY_RUN: ${{ (github.event_name == 'schedule' && vars.LIVE_ENABLED != 'true') || (github.event_name == 'workflow_dispatch' && inputs.dry_run) }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: python -m pip install .

      - name: Collect and register
        run: python -m gdweb_daily

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gdweb-report-${{ github.run_id }}
          path: reports/latest.txt
          if-no-files-found: ignore
          retention-days: 30

      - name: Configure GitHub Pages
        if: always()
        uses: actions/configure-pages@v5

      - name: Upload dashboard
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Persist dashboard and checkpoint
        if: success()
        run: |
          git config user.name "gdweb-daily-bot"
          git config user.email "gdweb-daily-bot@users.noreply.github.com"
          git add docs/data/latest.json
          if [ "$DRY_RUN" = "false" ]; then git add state/checkpoint.json; fi
          git diff --cached --quiet || git commit -m "chore: update GDWEB checkpoint"
          git push

  deploy-pages:
    needs: collect
    if: always()
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy dashboard
        id: deployment
        uses: actions/deploy-pages@v4
